# ============================================
# Configuration Production - Simul'Enfance - RENDER
# ============================================

# PostgreSQL (depuis variables d'environnement Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway - désactivé, Hibernate gère la création des tables
spring.flyway.enabled=false

# Force Hibernate to create tables
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# Validation de la connexion
spring.datasource.hikari.connection-test-query=SELECT 1

# Logs détaillés pour diagnostic
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# JWT Configuration (depuis variables d'environnement)
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# CORS Configuration
allowCorsOrigin=${CORS}

# Server
server.port=${PORT:8080}

# Logging
logging.level.root=INFO
logging.level.com.municipal=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Sécurité
server.error.include-message=never
server.error.include-stacktrace=never
# ============================================
# Configuration Production - Simul'Enfance - RENDER
# ============================================

# MongoDB Atlas (depuis variables d'environnement Render)
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=municipal_tariffs

# Désactiver PostgreSQL et JPA pour production MongoDB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# JWT Configuration (depuis variables d'environnement)
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# Server
server.port=${PORT:8080}

# Logging
logging.level.root=INFO
logging.level.com.municipal=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Sécurité
server.error.include-message=never
server.error.include-stacktrace=never
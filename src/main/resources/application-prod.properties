# ============================================
# Configuration Production - Simul'Enfance
# ============================================

# PostgreSQL pour production (depuis variables d'environnement)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/municipal_tariffs}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT Configuration (depuis variables d'environnement)
jwt.secret=${JWT_SECRET:MyDefaultSecretKeyForDevelopmentOnly123456789}
jwt.expiration=604800000

# Logging
logging.level.root=INFO
logging.level.com.municipal=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Sécurité
server.error.include-message=never
server.error.include-stacktrace=never
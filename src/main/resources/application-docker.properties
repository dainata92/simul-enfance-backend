# ============================================
# Configuration Docker/Render - Simul'Enfance
# ============================================
# Variables d'environnement depuis Render

# PostgreSQL (depuis variable Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# DÉSACTIVER FLYWAY (comme la formation)
spring.flyway.enabled=false

# MongoDB (depuis variables Render)
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DB}

# JWT
jwt.secret=${JWT_SECRET}

# CORS (depuis variable Render)
allowCorsOrigin=${CORS}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=simul-enfance-backend
server.port=8080

# CORS Configuration
allowCorsOrigin=http://localhost:4200

# JWT Configuration
# Clé secrète pour signer les tokens JWT (minimum 256 bits pour HS256)
# IMPORTANT : En production, utilisez une clé forte et stockez-la dans une variable d'environnement
jwt.secret=MySecretKeyForJWTTokenGenerationAndValidationMustBeLongEnoughForHS256Algorithm
# Durée de validité du token en millisecondes (604800000 ms = 7 jours)
jwt.expiration=604800000
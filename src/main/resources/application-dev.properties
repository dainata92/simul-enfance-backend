# PostgreSQL pour développement
spring.datasource.url=jdbc:postgresql://localhost:5432/municipal_tariffs
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration  
# Désactivé - Migration V6 appliquée (frequency)
spring.flyway.enabled=false

# Initialisation des données
# En Postgres local, éviter d'écraser les données à chaque redémarrage
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Logging
logging.level.com.municipal=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE